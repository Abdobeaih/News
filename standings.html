<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standings — NewsHub</title>
    <link rel="stylesheet" href="./asscet/cs/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="loader-spinner"></div>
    <p>Loading standings…</p>
</div>

<nav class="navbar">
    <a href="index.html" class="nav-brand">
        <i class="fa-solid fa-newspaper"></i> NewsHub
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="standings.html" class="active">Stanting</a></li>
        <li><a href="matches.html" class="nav-live">Live</a></li>
        <li><a href="stats.html">Stats</a></li>
    </ul>
    <button class="nav-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
</nav>
<ul class="mobile-nav" id="mobile-menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="standings.html" class="active">Stanting</a></li>
    <li><a href="matches.html" class="nav-live">Live</a></li>
    <li><a href="stats.html">Stats</a></li>
</ul>

<div class="page-wrap">
    <div class="page-title">
        <h1><i class="fa-solid fa-trophy"></i> League Standings</h1>
        <p>Current season table</p>
    </div>

    <div class="table-wrap">
        <table class="standings-tbl">
            <thead>
                <tr>
                    <th>#</th>
                    <th></th>
                    <th class="col-team">Team</th>
                    <th>P</th>
                    <th>W</th>
                    <th>D</th>
                    <th>L</th>
                    <th>GF</th>
                    <th>GA</th>
                    <th>GD</th>
                    <th>Pts</th>
                </tr>
            </thead>
            <tbody id="tbl-body"></tbody>
        </table>
    </div>

    <div class="legend-row">
        <span><i class="dot dot-champ"></i> Champions League</span>
        <span><i class="dot dot-europa"></i> Europa League</span>
        <span><i class="dot dot-releg"></i> Relegation</span>
    </div>
</div>

<button id="back-top"><i class="fa-solid fa-arrow-up"></i></button>

<footer><p class="footer-copy">&copy; 2025 NewsHub</p></footer>

<script src="./asscet/js/config.js"></script>

</body>
</html>
